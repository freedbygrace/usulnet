# =============================================================================
# usulnet Agent — Standalone Docker Compose
# =============================================================================
#
# Deploy this on remote Docker hosts to connect them to the usulnet master.
#
# Quick start:
#   1. Copy this file to the remote host
#   2. Set USULNET_GATEWAY_URL to your master's NATS address (natss://master-ip:4222)
#   3. Set USULNET_AGENT_TOKEN to the token generated in the master UI
#   4. docker compose -f docker-compose.agent.yml up -d
#
# The agent connects to the master via NATS (TLS encrypted by default).
# Self-signed CA is trusted automatically with natss:// scheme.
#
# =============================================================================

services:
  usulnet-agent:
    image: usulnet/usulnet-agent:${USULNET_VERSION:-latest}
    container_name: usulnet-agent
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agent_data:/app/data
    environment:
      # REQUIRED: Master NATS URL (natss:// = TLS with self-signed CA)
      - USULNET_GATEWAY_URL=${USULNET_GATEWAY_URL:-natss://master:4222}
      # REQUIRED: Agent token (generate in master UI → Nodes → Add Node → Agent)
      - USULNET_AGENT_TOKEN=${USULNET_AGENT_TOKEN}
    healthcheck:
      test: ["CMD", "test", "-f", "/app/data/agent.pid"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  agent_data:
